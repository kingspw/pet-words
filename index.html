<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PET 单词 30 天突破</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#6C5CE7;--s:#00CEC9;--d:#FF6B6B;--ok:#00B894;--w:#FDCB6E;--bg:#0F0F1A;--c1:#1A1A2E;--c2:#16213E;--t1:#fff;--t2:#a0a0b0;--t3:#666}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 50%,rgba(108,92,231,.12)0,transparent 50%),radial-gradient(circle at 80% 20%,rgba(0,206,201,.08)0,transparent 50%);z-index:-1}
.app{max-width:520px;margin:0 auto;padding:12px 16px;min-height:100vh;display:flex;flex-direction:column}

/* ===== NAV ===== */
.nav{display:flex;align-items:center;justify-content:space-between;padding:8px 0 12px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:16px}
.nav-title{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:6px 12px;border-radius:16px;background:transparent;border:none;color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;transition:.2s}
.nav-tab.active{background:rgba(108,92,231,.2);color:#fff;font-weight:700}

/* ===== SHARED ===== */
.screen{display:none;flex:1;flex-direction:column;animation:fadeIn .4s}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--c1);border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid rgba(255,255,255,.04)}
.btn{padding:12px 24px;border:none;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
.btn:active{transform:scale(.97)}
.bp{background:linear-gradient(135deg,var(--p),#a855f7);color:#fff;box-shadow:0 4px 15px rgba(108,92,231,.3)}
.bs{background:var(--c1);color:#fff;border:1.5px solid rgba(255,255,255,.1)}
.bg{background:linear-gradient(135deg,var(--ok),#00d2d3);color:#fff}
.bw{background:linear-gradient(135deg,var(--w),#f0932b);color:#1a1a2e}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.scrollable{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.empty{text-align:center;color:var(--t3);padding:40px 0;font-size:14px}

/* ===== DASHBOARD ===== */
.hero{text-align:center;padding:20px 0 10px}
.hero-day{font-size:14px;color:var(--s);font-weight:700;margin-bottom:4px}
.hero-title{font-size:28px;font-weight:900;margin-bottom:4px}
.hero-sub{color:var(--t2);font-size:13px}
.streak-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0;padding:10px;background:linear-gradient(135deg,rgba(253,203,110,.1),rgba(255,107,107,.1));border-radius:14px}
.streak-bar .fire{font-size:28px}
.streak-bar .num{font-size:22px;font-weight:900;color:var(--w)}
.streak-bar .label{font-size:12px;color:var(--t2)}
.progress-ring{margin:10px auto;position:relative;width:140px;height:140px}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.progress-ring .pct{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-ring .plabel{font-size:11px;color:var(--t3)}
.daily-plan{margin-top:8px}
.daily-plan .section-title{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.task-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--c1);border-radius:14px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:.2s}
.task-card:hover{border-color:var(--p);transform:translateX(3px)}
.task-card.done{opacity:.5;border-color:var(--ok)}
.task-icon{font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(108,92,231,.1);border-radius:12px;flex-shrink:0}
.task-info .t-title{font-weight:700;font-size:14px}
.task-info .t-desc{color:var(--t2);font-size:12px;margin-top:2px}
.task-check{margin-left:auto;font-size:20px;flex-shrink:0}
.motivation{text-align:center;margin:16px 0 8px;padding:14px;background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(0,206,201,.08));border-radius:14px;font-size:13px;color:var(--t2);line-height:1.6}
.motivation b{color:var(--w)}
.day-grid{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.day-dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--c2);color:var(--t3);cursor:pointer;transition:.2s}
.day-dot.done{background:var(--ok);color:#fff}
.day-dot.today{border:2px solid var(--p);color:var(--p)}
.day-dot.future{opacity:.4}
.day-dot.locked{opacity:.25}

/* ===== LEARN MODE ===== */
.learn-progress{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-size:13px;color:var(--t2)}
.learn-progress .bar{flex:1;height:4px;background:var(--c2);border-radius:2px;overflow:hidden}
.learn-progress .bar-fill{height:100%;background:linear-gradient(90deg,var(--s),var(--p));transition:width .3s}
.flashcard{position:relative;min-height:300px;background:linear-gradient(145deg,var(--c1),var(--c2));border-radius:20px;padding:30px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,.05);transition:transform .3s;margin-bottom:12px}
.flashcard .fc-cat{font-size:12px;color:var(--p);font-weight:700;margin-bottom:12px}
.flashcard .fc-word{font-size:36px;font-weight:900;margin-bottom:8px;letter-spacing:1px}
.flashcard .fc-ph{color:var(--t3);font-size:15px;margin-bottom:16px}
.flashcard .fc-cn{font-size:22px;font-weight:700;color:var(--s);margin-bottom:10px}
.flashcard .fc-ex{font-size:14px;color:var(--t2);font-style:italic;line-height:1.5;max-width:90%}
.flashcard .fc-hint{position:absolute;bottom:14px;font-size:12px;color:var(--t3)}
.flashcard .fc-num{position:absolute;top:14px;right:18px;font-size:12px;color:var(--t3)}
.fc-btns{display:flex;gap:10px;margin-top:8px}
.fc-btns .btn{flex:1;padding:14px}
.know-btn{background:var(--ok);color:#fff;font-size:15px;border:none;border-radius:50px;padding:12px;cursor:pointer;font-family:inherit;font-weight:700}
.dunno-btn{background:var(--d);color:#fff;font-size:15px;border:none;border-radius:50px;padding:12px;cursor:pointer;font-family:inherit;font-weight:700}

/* ===== QUIZ MODE ===== */
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.quiz-stat{display:flex;align-items:center;gap:5px;background:var(--c1);padding:5px 12px;border-radius:16px;font-size:13px;font-weight:700}
.timer-bar-wrap{height:4px;background:var(--c2);border-radius:2px;margin-bottom:20px;overflow:hidden}
.timer-bar{height:100%;background:linear-gradient(90deg,var(--ok),var(--w),var(--d));border-radius:2px;transition:width .05s linear;width:100%}
.q-card{background:linear-gradient(145deg,var(--c1),var(--c2));border-radius:18px;padding:28px 20px;text-align:center;margin-bottom:8px;border:1px solid rgba(255,255,255,.04);position:relative}
.q-card .q-cat{font-size:12px;color:var(--p);font-weight:700;margin-bottom:10px}
.q-card .q-word{font-size:34px;font-weight:900;margin-bottom:6px}
.q-card .q-ph{color:var(--t3);font-size:14px}
.q-card .q-context{color:var(--t2);font-size:14px;margin-top:10px;font-style:italic;line-height:1.5}
.q-hint{color:var(--t3);font-size:12px;text-align:center;margin-bottom:12px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.opt{background:var(--c1);border:2px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;text-align:center}
.opt:hover:not(.dis){border-color:var(--p);background:rgba(108,92,231,.08)}
.opt.ok{border-color:var(--ok);background:rgba(0,184,148,.15);animation:pop .4s}
.opt.no{border-color:var(--d);background:rgba(255,107,107,.15);animation:shake .3s}
.opt.dis{pointer-events:none;opacity:.4}
.opt.reveal{border-color:var(--ok);background:rgba(0,184,148,.1);opacity:1!important}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fb{text-align:center;min-height:40px;font-size:14px;font-weight:700}
.fb.fbok{color:var(--ok)}
.fb.fbno{color:var(--d)}
.fb .fb-ex{font-weight:400;color:var(--t2);font-size:13px;margin-top:4px;font-style:italic}
.streak-badge{position:absolute;top:10px;right:14px;background:linear-gradient(135deg,#ff6b6b,#ee5a24);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;display:none}
.streak-badge.show{display:block}

/* ===== CONTEXT QUIZ (PET-style fill blank) ===== */
.ctx-sentence{font-size:18px;line-height:1.8;text-align:center;margin:16px 0;color:var(--t1)}
.ctx-sentence .blank{border-bottom:2px dashed var(--p);padding:0 12px;color:var(--p);font-weight:700}
.ctx-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ===== SPELLING MODE ===== */
.spell-prompt{text-align:center;margin:20px 0}
.spell-prompt .sp-cn{font-size:28px;font-weight:900;color:var(--w);margin-bottom:6px}
.spell-prompt .sp-cat{font-size:12px;color:var(--t3)}
.spell-prompt .sp-hint{color:var(--t2);font-size:14px;margin-top:8px;letter-spacing:4px}
.spell-input{width:100%;padding:14px;border-radius:14px;border:2px solid rgba(255,255,255,.1);background:var(--c1);color:#fff;font-size:20px;font-family:inherit;text-align:center;letter-spacing:2px;outline:none;transition:border-color .2s;margin-bottom:12px}
.spell-input:focus{border-color:var(--p)}
.spell-input.s-ok{border-color:var(--ok);background:rgba(0,184,148,.1)}
.spell-input.s-no{border-color:var(--d);background:rgba(255,107,107,.1)}

/* ===== RESULT ===== */
.result{text-align:center;padding:20px 0}
.result .r-emoji{font-size:64px;margin-bottom:8px}
.result .r-title{font-size:26px;font-weight:900;margin-bottom:4px}
.result .r-sub{color:var(--t2);font-size:14px;margin-bottom:20px}
.r-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.r-stat{background:var(--c1);border-radius:14px;padding:14px 8px;text-align:center}
.r-stat .n{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.r-stat .l{font-size:11px;color:var(--t3);margin-top:2px}
.r-wrong{text-align:left;margin-bottom:20px}
.r-wrong .rw-title{font-size:14px;color:var(--d);font-weight:700;margin-bottom:8px;text-align:center}
.rw-item{display:flex;justify-content:space-between;background:var(--c1);border-radius:10px;padding:10px 14px;margin-bottom:6px;font-size:13px}
.rw-item .en{font-weight:700;color:var(--w)}
.rw-item .cn{color:var(--t2)}
.r-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* ===== WORDBOOK ===== */
.wb-search{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid rgba(255,255,255,.08);background:var(--c1);color:#fff;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
.wb-search:focus{border-color:var(--p)}
.wb-search::placeholder{color:#444}
.wb-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.wb-f{padding:5px 12px;border-radius:14px;background:var(--c2);border:none;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:.2s}
.wb-f.active{background:rgba(108,92,231,.2);color:#fff}
.wb-item{display:flex;align-items:center;gap:10px;background:var(--c1);border-radius:12px;padding:10px 14px;margin-bottom:6px;cursor:pointer;transition:.2s}
.wb-item:hover{background:rgba(108,92,231,.08)}
.wb-item .wi-en{font-weight:700;font-size:15px}
.wb-item .wi-cat{font-size:10px;color:var(--t3)}
.wb-item .wi-right{margin-left:auto;text-align:right}
.wb-item .wi-cn{color:var(--t2);font-size:13px}
.wb-item .wi-m{font-size:10px;margin-top:2px}
.m-new{color:var(--d)}.m-learn{color:var(--w)}.m-master{color:var(--ok)}

/* ===== FLOAT EFFECTS ===== */
.float-score{position:fixed;font-size:22px;font-weight:900;color:var(--w);pointer-events:none;animation:floatUp .8s ease forwards;z-index:100}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px) scale(1.2)}}
.combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;font-weight:900;background:linear-gradient(135deg,#ff6b6b,#feca57,#00cec9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;pointer-events:none;animation:comboIn .7s ease forwards;z-index:200}
@keyframes comboIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.4)}}

/* ===== Demon Slayer character effects ===== */
.ds-char{position:fixed;top:50%;pointer-events:none;z-index:300;display:flex;align-items:center;gap:8px}
.ds-char *{pointer-events:none}

/* Tanjiro — left to right */
.ds-tanjiro{left:-200px;animation:tanjiroFly 2s ease-in-out forwards}
.tanjiro-body{position:relative;width:80px;height:110px}
.tanjiro-head{width:44px;height:44px;background:radial-gradient(circle at 60% 40%,#fdd,#f5c6a8);border-radius:50%;position:absolute;top:0;left:18px;z-index:2;border:2px solid #c9967a;overflow:hidden}
.tanjiro-head::before{content:'';position:absolute;top:0;left:0;right:0;height:22px;background:linear-gradient(180deg,#2a1a0e 60%,#3d2415);border-radius:22px 22px 0 0}
.tanjiro-head::after{content:'';position:absolute;top:6px;left:5px;width:8px;height:12px;background:#8b1a1a;border-radius:0 0 4px 4px;box-shadow:1px 0 0 #6b0f0f}
.tanjiro-eyes{position:absolute;top:22px;left:12px;width:20px;height:6px;display:flex;gap:6px}
.tanjiro-eyes::before,.tanjiro-eyes::after{content:'';width:7px;height:7px;background:#8b2252;border-radius:50%}
.tanjiro-haori{position:absolute;top:38px;left:4px;width:72px;height:52px;border-radius:6px 6px 10px 10px;overflow:hidden;background:repeating-conic-gradient(#2d5a3d 0% 25%,#1a1a1a 0% 50%) 0 0/16px 16px}
.tanjiro-earring{position:absolute;top:32px;left:16px;width:6px;height:14px;background:linear-gradient(180deg,#d4af37,#c0392b);border-radius:3px}
.tanjiro-slash{position:absolute;right:-60px;top:10px;font-size:70px;color:rgba(100,180,255,.9);text-shadow:0 0 20px rgba(100,180,255,.6),0 0 40px rgba(100,180,255,.3);animation:slashFlash .4s ease .6s both}
.tanjiro-text{font-size:18px;font-weight:900;color:#64b5f6;text-shadow:0 0 15px rgba(100,180,255,.8);white-space:nowrap;animation:textPop .3s ease .8s both}
@keyframes tanjiroFly{
  0%{left:-200px;top:50%;transform:translateY(-50%) scale(.8);opacity:0}
  15%{opacity:1;transform:translateY(-50%) scale(1)}
  40%{left:calc(50% - 80px);top:50%;transform:translateY(-50%) scale(1.1)}
  60%{left:calc(50% - 60px);transform:translateY(-50%) scale(1)}
  85%{opacity:1;left:calc(50% - 40px);transform:translateY(-50%) scale(1)}
  100%{left:110%;transform:translateY(-50%) scale(.9);opacity:0}
}
@keyframes slashFlash{0%{opacity:0;transform:rotate(-30deg) scale(.5)}50%{opacity:1;transform:rotate(0deg) scale(1.2)}100%{opacity:.8;transform:rotate(10deg) scale(1)}}
@keyframes textPop{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}

/* Akaza — right to left */
.ds-akaza{right:-200px;animation:akazaFly 2.2s ease-in-out forwards}
.akaza-body{position:relative;width:80px;height:110px}
.akaza-head{width:46px;height:46px;background:radial-gradient(circle at 50% 45%,#fdd,#e8c4b8);border-radius:50%;position:absolute;top:0;left:17px;z-index:2;border:2px solid #d4a0a0;overflow:hidden}
.akaza-head::before{content:'';position:absolute;top:0;left:0;right:0;height:18px;background:linear-gradient(180deg,#ff69b4 40%,#ff85c8);border-radius:22px 22px 0 0}
.akaza-head::after{content:'';position:absolute;top:8px;left:4px;right:4px;height:12px;background:transparent;border-top:2px solid rgba(70,130,180,.6);border-radius:0}
.akaza-lines{position:absolute;top:10px;left:6px;right:6px;height:30px}
.akaza-lines::before{content:'';position:absolute;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(70,130,180,.25) 4px,rgba(70,130,180,.25) 5px)}
.akaza-eyes{position:absolute;top:22px;left:11px;width:24px;height:8px;display:flex;gap:6px}
.akaza-eyes::before,.akaza-eyes::after{content:'';width:8px;height:8px;background:radial-gradient(circle,#ffd700 30%,#ff4500 70%);border-radius:50%;border:1px solid #ff4500}
.akaza-torso{position:absolute;top:40px;left:6px;width:68px;height:50px;background:linear-gradient(180deg,#1a0a2e,#2d1b4e);border-radius:6px 6px 10px 10px;overflow:hidden}
.akaza-torso::before{content:'';position:absolute;inset:4px;border:2px solid rgba(70,130,180,.3);border-radius:4px;background:repeating-linear-gradient(90deg,transparent,transparent 8px,rgba(100,180,255,.08) 8px,rgba(100,180,255,.08) 9px)}
.akaza-fist{position:absolute;left:-50px;top:20px;animation:punchSwing .3s ease .5s both}
.akaza-fist-inner{width:36px;height:36px;background:radial-gradient(circle at 50% 50%,#fdd,#e8c4b8);border-radius:50% 50% 50% 20%;border:2px solid #d4a0a0;box-shadow:0 0 20px rgba(255,100,50,.6),0 0 40px rgba(255,50,0,.3)}
.akaza-fist-inner::after{content:'';position:absolute;inset:3px;border:1.5px solid rgba(70,130,180,.4);border-radius:inherit}
.akaza-aura{position:absolute;left:-65px;top:5px;width:60px;height:60px;background:radial-gradient(circle,rgba(255,50,0,.4),transparent 70%);border-radius:50%;animation:auraPulse .4s ease .5s both}
.akaza-text{font-size:18px;font-weight:900;color:#ff6b6b;text-shadow:0 0 15px rgba(255,80,80,.8);white-space:nowrap;animation:textPop .3s ease .7s both}
@keyframes akazaFly{
  0%{right:-200px;top:50%;transform:translateY(-50%) scale(.8);opacity:0}
  15%{opacity:1;transform:translateY(-50%) scale(1)}
  35%{right:calc(50% - 80px);top:50%;transform:translateY(-50%) scale(1.1)}
  55%{right:calc(50% - 60px);transform:translateY(-50%) scale(1)}
  80%{opacity:1;right:calc(50% - 40px);transform:translateY(-50%) scale(1)}
  100%{right:110%;transform:translateY(-50%) scale(.9);opacity:0}
}
@keyframes punchSwing{0%{transform:translateX(30px) rotate(20deg)}60%{transform:translateX(-10px) rotate(-10deg)}100%{transform:translateX(0) rotate(0deg)}}
@keyframes auraPulse{0%{transform:scale(0);opacity:0}50%{transform:scale(1.5);opacity:1}100%{transform:scale(2);opacity:0}}

/* ===== RESPONSIVE ===== */
@media(max-width:400px){
  .q-card .q-word,.flashcard .fc-word{font-size:26px}
  .opts{gap:8px}
  .opt{padding:11px 8px;font-size:13px}
}
</style>
</head>
<body>
<div class="app">

<!-- NAV -->
<div class="nav">
  <div class="nav-title">PET 30天突破</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="dashboard" onclick="switchTab(this)">首页</button>
    <button class="nav-tab" data-tab="wordbook" onclick="switchTab(this)">词汇</button>
    <button class="nav-tab" data-tab="calendar" onclick="switchTab(this)">日历</button>
  </div>
</div>

<!-- DASHBOARD SCREEN -->
<div class="screen active" id="scr-dashboard">
  <div class="hero">
    <div class="hero-day" id="hero-day">第 1 天 / 30</div>
    <div class="hero-title" id="hero-title">今日计划</div>

// Deduplicate
const _seen = new Set();
const WORDS = ALL_WORDS.filter(w => {
  const k = w.en.toLowerCase();
  if (_seen.has(k)) return false;
  _seen.add(k);
  return true;
});

const WORDS_PER_DAY = 20;
const TOTAL_DAYS = 30;

// ============================================================
//  PERSISTENCE
// ============================================================
const STORAGE_KEY = 'pet30_v2';

function defaultData() {
  return {
    currentDay: 1,
    streak: 0,
    lastDate: null,
    mastery: {},        // word.en -> {correct, wrong, lastSeen, nextReview}
    dayProgress: {},    // day -> {learned, quizzed, spelled, reviewed}
    totalScore: 0,
  };
}

let D = defaultData();

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(D)); } catch(e) {} }
function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) D = { ...defaultData(), ...JSON.parse(s) };
  } catch(e) {}
  // Update streak
  const today = new Date().toDateString();
  if (D.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (D.lastDate === yesterday) { /* streak continues */ }
    else if (D.lastDate !== today) { D.streak = 0; }
  }
}

load();

function resetAll() {
  D = defaultData();
  save();
  location.reload();
}

// ============================================================
//  DAY PLAN — which words for which day + spaced review
// ============================================================
function getWordsForDay(day) {
  const start = (day - 1) * WORDS_PER_DAY;
  return WORDS.slice(start, start + WORDS_PER_DAY);
}

function getReviewWords(day) {
  // Spaced repetition: review words from day-1, day-3, day-7, day-14
  const reviewDays = [day-1, day-3, day-7, day-14].filter(d => d >= 1);
  let pool = [];
  reviewDays.forEach(d => {
    getWordsForDay(d).forEach(w => {
      const m = D.mastery[w.en];
      // Only review if not fully mastered (need >= 3 correct and ratio > 2)
      if (!m || m.correct < 3 || m.correct <= m.wrong * 2) {
        pool.push(w);
      }
    });
  });
  // Also add any words with high wrong count
  Object.keys(D.mastery).forEach(en => {
    const m = D.mastery[en];
    if (m.wrong > m.correct && !pool.find(w => w.en === en)) {
      const w = WORDS.find(x => x.en === en);
      if (w) pool.push(w);
    }
  });
  return shuffle(pool).slice(0, 20);
}

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
function renderDashboard() {
  const day = D.currentDay;
  const dp = D.dayProgress[day] || {};
  const newWords = getWordsForDay(day);
  const reviewWords = getReviewWords(day);

  document.getElementById('hero-day').textContent = `第 ${day} 天 / ${TOTAL_DAYS}`;
  document.getElementById('hero-title').textContent = day <= TOTAL_DAYS ? '今日计划' : '🎉 全部完成！';
  document.getElementById('hero-sub').textContent = day <= TOTAL_DAYS
    ? `学习${newWords.length}个新词` + (reviewWords.length > 0 ? ` + 复习${reviewWords.length}个旧词` : '')
    : '恭喜你完成了30天的学习计划！继续复习巩固吧。';

  // Stats
  document.getElementById('streak-num').textContent = D.streak;
  const learnedCount = Object.keys(D.mastery).filter(k => D.mastery[k].correct > 0).length;
  document.getElementById('total-words').textContent = learnedCount;
  const masteredCount = Object.keys(D.mastery).filter(k => {
    const m = D.mastery[k];
    return m.correct >= 3 && m.correct > m.wrong * 2;
  }).length;
  const pct = WORDS.length > 0 ? Math.round((masteredCount / WORDS.length) * 100) : 0;
  document.getElementById('mastery-pct').textContent = pct + '%';

  // Progress ring
  let tasks = ['learned', 'quizzed', 'spelled'];
  if (reviewWords.length > 0) tasks.push('reviewed');
  const done = tasks.filter(t => dp[t]).length;
  const dayPct = tasks.length > 0 ? Math.round((done / tasks.length) * 100) : 0;
  document.getElementById('day-pct').textContent = dayPct + '%';
  const circle = document.getElementById('prog-circle');
  const offset = 377 - (377 * dayPct / 100);
  circle.style.strokeDashoffset = offset;

  // Tasks
  const taskList = document.getElementById('task-list');
  const taskDefs = [
    { key: 'learned', icon: '📖', title: '学习新词', desc: `学习今天的${newWords.length}个新单词`, action: () => startLearn(newWords) },
    { key: 'quizzed', icon: '🎯', title: '选择题闯关', desc: '四选一测试，检验记忆效果', action: () => startQuiz('choice', [...newWords, ...reviewWords.slice(0, 5)]) },
    { key: 'spelled', icon: '✍️', title: '拼写挑战', desc: '看中文拼英文，加深记忆', action: () => startSpell([...newWords, ...reviewWords.slice(0, 5)]) },
  ];
  if (reviewWords.length > 0) {
    taskDefs.push({ key: 'reviewed', icon: '🔄', title: '复习旧词', desc: `复习${reviewWords.length}个需要巩固的单词`, action: () => startQuiz('review', reviewWords) });
  }

  taskList.innerHTML = taskDefs.map(t => `
    <div class="task-card ${dp[t.key] ? 'done' : ''}" data-task="${t.key}">
      <div class="task-icon">${t.icon}</div>
      <div class="task-info"><div class="t-title">${t.title}</div><div class="t-desc">${t.desc}</div></div>
      <div class="task-check">${dp[t.key] ? '✅' : '▶️'}</div>
    </div>
  `).join('');

  taskList.querySelectorAll('.task-card').forEach((card, i) => {
    card.onclick = () => taskDefs[i].action();
  });

  // Motivation
  document.getElementById('motivation').innerHTML = QUOTES[day % QUOTES.length];
}

function startLearn(words) {
  learnState = { words: shuffle([...words]), index: 0, flipped: false };
  switchToScreen('scr-learn');
  showLearnCard();
}

function showLearnCard() {
  const { words, index } = learnState;
  if (index >= words.length) { finishLearn(); return; }
  learnState.flipped = false;
  const w = words[index];
  document.getElementById('lp-text').textContent = `${index + 1}/${words.length}`;
  document.getElementById('lp-bar').style.width = ((index + 1) / words.length * 100) + '%';
  document.getElementById('fc-num').textContent = `${index + 1}/${words.length}`;
  document.getElementById('fc-cat').textContent = w.cat;
  document.getElementById('fc-word').textContent = w.en;
  document.getElementById('fc-ph').textContent = w.ph || '';
  document.getElementById('fc-cn').textContent = w.cn;
  document.getElementById('fc-ex').textContent = w.ex || '';
  document.getElementById('fc-back').style.display = 'none';
  document.getElementById('fc-btns').style.display = 'none';
  document.getElementById('fc-flip-hint').style.display = '';
}

function flipCard() {
  if (learnState.flipped) return;
  learnState.flipped = true;
  document.getElementById('fc-back').style.display = '';
  document.getElementById('fc-btns').style.display = 'flex';
  document.getElementById('fc-flip-hint').style.display = 'none';
}

function learnNext(known) {
  const w = learnState.words[learnState.index];
  if (!D.mastery[w.en]) D.mastery[w.en] = { correct: 0, wrong: 0 };
  if (known) D.mastery[w.en].correct++;
  else {
    D.mastery[w.en].wrong++;
    // Put back later for re-review
    learnState.words.push(w);
  }
  save();
  learnState.index++;
  showLearnCard();
}

function finishLearn() {
  if (!D.dayProgress[D.currentDay]) D.dayProgress[D.currentDay] = {};
  D.dayProgress[D.currentDay].learned = true;
  checkDayComplete();
  save();
  showResult('learn', { total: learnState.words.length });
}

function exitLearn() {
  switchToScreen('scr-dashboard');
  switchTab(document.querySelector('[data-tab="dashboard"]'));
}

// ============================================================
//  QUIZ MODE (Multiple choice)
// ============================================================
let qzState = { words: [], index: 0, lives: 3, score: 0, streak: 0, maxStreak: 0, correct: 0, wrong: [], answered: false, timerID: null, mode: 'choice' };

function startQuiz(mode, words) {
  clearInterval(qzState.timerID);
  qzState = { words: shuffle([...words]).slice(0, 20), index: 0, lives: 3, score: 0, streak: 0, maxStreak: 0, correct: 0, wrong: [], answered: false, timerID: null, mode };
  switchToScreen('scr-quiz');
  document.getElementById('qz-lives').textContent = '3';
  document.getElementById('qz-score').textContent = '0';
  showQuizQ();
}

function showQuizQ() {
  if (qzState.index >= qzState.words.length || qzState.lives <= 0) { finishQuiz(); return; }
  qzState.answered = false;
  const w = qzState.words[qzState.index];
  const isReverse = qzState.index % 3 === 1; // Mix modes
  const isContext = qzState.index % 5 === 2 && w.ex; // Context fill-blank

  document.getElementById('qz-progress').textContent = `${qzState.index + 1}/${qzState.words.length}`;
  document.getElementById('qz-fb').innerHTML = '';

  let html = '';
  if (isContext && w.ex) {
    // Context mode — fill in the blank
    const sentence = w.ex.replace(new RegExp(w.en, 'gi'), '<span class="blank">______</span>');
    html = `<div class="q-card"><div class="q-cat">${w.cat}</div><div class="ctx-sentence">${sentence}</div><div class="streak-badge ${qzState.streak >= 3 ? 'show' : ''}" id="qz-streak">🔥 x${qzState.streak}</div></div>`;
    html += `<div class="q-hint">选出正确的单词填入空白 👇</div>`;
    const opts = genOpts(w, true);
    html += `<div class="opts">${opts.map((o, i) => `<button class="opt" onclick="answerQuiz(this,${o.correct},'${escHtml(w.en)}','${escHtml(w.cn)}')">${o.text}</button>`).join('')}</div>`;
  } else if (isReverse) {
    html = `<div class="q-card"><div class="q-cat">${w.cat}</div><div class="q-word">${w.cn}</div><div class="streak-badge ${qzState.streak >= 3 ? 'show' : ''}" id="qz-streak">🔥 x${qzState.streak}</div></div>`;
    html += `<div class="q-hint">选出正确的英文单词 👇</div>`;
    const opts = genOpts(w, true);
    html += `<div class="opts">${opts.map((o, i) => `<button class="opt" onclick="answerQuiz(this,${o.correct},'${escHtml(w.en)}','${escHtml(w.cn)}')">${o.text}</button>`).join('')}</div>`;
  } else {
    html = `<div class="q-card"><div class="q-cat">${w.cat}</div><div class="q-word">${w.en}</div><div class="q-ph">${w.ph || ''}</div><div class="streak-badge ${qzState.streak >= 3 ? 'show' : ''}" id="qz-streak">🔥 x${qzState.streak}</div></div>`;
    html += `<div class="q-hint">选出正确的中文含义 👇</div>`;
    const opts = genOpts(w, false);
    html += `<div class="opts">${opts.map((o, i) => `<button class="opt" onclick="answerQuiz(this,${o.correct},'${escHtml(w.en)}','${escHtml(w.cn)}')">${o.text}</button>`).join('')}</div>`;
  }

  document.getElementById('quiz-body').innerHTML = html;
  startQzTimer();
}

function genOpts(word, reverse) {
  const correctText = reverse ? word.en : word.cn;
  const pool = WORDS.filter(w => w.en !== word.en);
  const wrongs = shuffle(pool).slice(0, 3).map(w => ({ text: reverse ? w.en : w.cn, correct: false }));
  // Ensure no duplicate
  const texts = new Set(wrongs.map(o => o.text));
  if (texts.has(correctText)) {
    const rep = pool.find(w => !texts.has(reverse ? w.en : w.cn));
    if (rep) wrongs[0] = { text: reverse ? rep.en : rep.cn, correct: false };
  }
  return shuffle([...wrongs, { text: correctText, correct: true }]);
}

function escHtml(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

let qzTimerID = null;
function startQzTimer() {
  clearInterval(qzTimerID);
  let t = 1500; // 15 seconds
  const bar = document.getElementById('qz-timer');
  bar.style.width = '100%';
  qzTimerID = setInterval(() => {
    t--;
    bar.style.width = (t / 1500 * 100) + '%';
    if (t <= 0) { clearInterval(qzTimerID); if (!qzState.answered) quizTimeUp(); }
  }, 10);
}

function quizTimeUp() {
  qzState.answered = true;
  const w = qzState.words[qzState.index];
  if (!D.mastery[w.en]) D.mastery[w.en] = { correct: 0, wrong: 0 };
  D.mastery[w.en].wrong++;
  qzState.streak = 0;
  qzState.lives--;
  document.getElementById('qz-lives').textContent = qzState.lives;
  qzState.wrong.push(w);
  save();
  // Highlight correct
  document.querySelectorAll('.opt').forEach(b => b.classList.add('dis'));
  document.getElementById('qz-fb').innerHTML = `<div class="fb fbno">⏰ 时间到！正确答案：${w.en} — ${w.cn}</div>`;
  setTimeout(() => { qzState.index++; showQuizQ(); }, 2000);
}

function answerQuiz(btn, correct, en, cn) {
  if (qzState.answered) return;
  qzState.answered = true;
  clearInterval(qzTimerID);
  const w = qzState.words[qzState.index];
  if (!D.mastery[w.en]) D.mastery[w.en] = { correct: 0, wrong: 0 };

  if (correct) {
    btn.classList.add('ok');
    showStar(true);
    qzState.streak++;
    if (qzState.streak > qzState.maxStreak) qzState.maxStreak = qzState.streak;
    qzState.correct++;
    const pts = 10 + Math.min(qzState.streak, 10) * 2;
    qzState.score += pts;
    D.mastery[w.en].correct++;
    D.totalScore += pts;
    document.querySelectorAll('.opt').forEach(b => { if (b !== btn) b.classList.add('dis'); });
    document.getElementById('qz-fb').innerHTML = `<div class="fb fbok">✅ 正确！ +${pts}</div>`;
    document.getElementById('qz-score').textContent = qzState.score;
    if (qzState.streak >= 5 && qzState.streak % 5 === 0) showCombo('🔥 x' + qzState.streak);
    save();
    setTimeout(() => { qzState.index++; showQuizQ(); }, 2000);
  } else {
    btn.classList.add('no');
    showStar(false);
    qzState.streak = 0;
    qzState.lives--;
    document.getElementById('qz-lives').textContent = qzState.lives;
    D.mastery[w.en].wrong++;
    qzState.wrong.push(w);
    // Show correct
    const correctText = btn.closest('.screen').querySelector('.q-word')?.textContent === w.cn ? w.en : w.cn;
    document.querySelectorAll('.opt').forEach(b => {
      if (b.textContent === w.cn || b.textContent === w.en) b.classList.add('reveal');
      else if (b !== btn) b.classList.add('dis');
    });
    document.getElementById('qz-fb').innerHTML = `<div class="fb fbno">❌ 正确：${w.en} — ${w.cn}</div><div class="fb-ex" style="color:var(--t2);font-size:12px;margin-top:4px">${w.ex || ''}</div>`;
    save();
    setTimeout(() => { qzState.index++; showQuizQ(); }, 2500);
  }
}

function finishQuiz() {
  clearInterval(qzTimerID);
  const key = qzState.mode === 'review' ? 'reviewed' : 'quizzed';
  if (!D.dayProgress[D.currentDay]) D.dayProgress[D.currentDay] = {};
  D.dayProgress[D.currentDay][key] = true;
  checkDayComplete();
  save();
  showResult('quiz', { score: qzState.score, correct: qzState.correct, total: qzState.index, maxStreak: qzState.maxStreak, wrong: qzState.wrong });
}

function exitQuiz() {
  clearInterval(qzTimerID);
  switchToScreen('scr-dashboard');
  switchTab(document.querySelector('[data-tab="dashboard"]'));
}

// ============================================================
//  SPELL MODE
// ============================================================
let spState = { words: [], index: 0, lives: 3, score: 0, correct: 0, wrong: [], answered: false };

function startSpell(words) {
  spState = { words: shuffle([...words]).slice(0, 15), index: 0, lives: 3, score: 0, correct: 0, wrong: [], answered: false };
  switchToScreen('scr-spell');
  document.getElementById('sp-lives').textContent = '3';
  document.getElementById('sp-score').textContent = '0';
  showSpellQ();
}

function showSpellQ() {
  if (spState.index >= spState.words.length || spState.lives <= 0) { finishSpell(); return; }
  spState.answered = false;
  const w = spState.words[spState.index];
  document.getElementById('sp-progress').textContent = `${spState.index + 1}/${spState.words.length}`;
  document.getElementById('sp-fb').innerHTML = '';

  // Hint: show first letter + underscores
  const hint = w.en[0] + ' ' + w.en.slice(1).replace(/[a-zA-Z]/g, '_ ').trim();

  document.getElementById('spell-body').innerHTML = `
    <div class="spell-prompt">
      <div class="sp-cn">${w.cn}</div>
      <div class="sp-cat">${w.cat} ${w.ph ? '· ' + w.ph : ''}</div>
      <div class="sp-hint">${hint}</div>
    </div>
    <input type="text" class="spell-input" id="spell-inp" placeholder="输入英文单词..." autocomplete="off" autocapitalize="off" autofocus>
    <div style="text-align:center"><button class="btn bp" onclick="checkSpell()">确认</button></div>
  `;

  const inp = document.getElementById('spell-inp');
  inp.focus();
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkSpell(); });
}

function checkSpell() {
  if (spState.answered) return;
  spState.answered = true;
  const w = spState.words[spState.index];
  const inp = document.getElementById('spell-inp');
  const answer = inp.value.trim().toLowerCase();
  const correct = answer === w.en.toLowerCase();

  if (!D.mastery[w.en]) D.mastery[w.en] = { correct: 0, wrong: 0 };

  if (correct) {
    inp.classList.add('s-ok');
    spState.correct++;
    spState.score += 15;
    D.mastery[w.en].correct++;
    document.getElementById('sp-score').textContent = spState.score;
    document.getElementById('sp-fb').innerHTML = `<div class="fb fbok">✅ 正确！ +15</div>`;
    save();
    setTimeout(() => { spState.index++; showSpellQ(); }, 1000);
  } else {
    inp.classList.add('s-no');
    spState.lives--;
    document.getElementById('sp-lives').textContent = spState.lives;
    D.mastery[w.en].wrong++;
    spState.wrong.push(w);
    document.getElementById('sp-fb').innerHTML = `<div class="fb fbno">❌ 正确拼写：<b>${w.en}</b></div><div style="text-align:center;color:var(--t2);font-size:12px;margin-top:4px">${w.ex || ''}</div>`;
    save();
    setTimeout(() => { spState.index++; showSpellQ(); }, 2500);
  }
}

function finishSpell() {
  if (!D.dayProgress[D.currentDay]) D.dayProgress[D.currentDay] = {};
  D.dayProgress[D.currentDay].spelled = true;
  checkDayComplete();
  save();
  showResult('spell', { score: spState.score, correct: spState.correct, total: spState.index, wrong: spState.wrong });
}

// ============================================================
//  CHECK DAY COMPLETE
// ============================================================
function checkDayComplete() {
  const dp = D.dayProgress[D.currentDay] || {};
  const reviewWords = getReviewWords(D.currentDay);
  const needReview = reviewWords.length > 0;
  const allDone = dp.learned && dp.quizzed && dp.spelled && (!needReview || dp.reviewed);
  if (allDone) {
    const today = new Date().toDateString();
    if (D.lastDate !== today) {
      D.streak++;
      D.lastDate = today;
    }
    if (D.currentDay < TOTAL_DAYS) {
      // Unlock next day (don't auto-advance, let user choose)
    }
  }
}

function advanceDay() {
  if (D.currentDay < TOTAL_DAYS) {
    D.currentDay++;
    save();
  }
  switchToScreen('scr-dashboard');
  switchTab(document.querySelector('[data-tab="dashboard"]'));
}

// ============================================================
//  RESULT SCREEN
// ============================================================
function showResult(type, data) {
  switchToScreen('scr-result');
  const dp = D.dayProgress[D.currentDay] || {};
  const reviewWords = getReviewWords(D.currentDay);
  const needReview = reviewWords.length > 0;
  const allDone = dp.learned && dp.quizzed && dp.spelled && (!needReview || dp.reviewed);

  let emoji, title, sub;
  if (type === 'learn') {
    emoji = '📖'; title = '学习完成！'; sub = `你学习了 ${data.total} 个单词`;
  } else {
    const pct = data.total > 0 ? Math.round(data.correct / data.total * 100) : 0;
    if (pct >= 90) { emoji = '🏆'; title = '太强了！'; sub = '你已经掌握得很好了！'; }
    else if (pct >= 70) { emoji = '🎉'; title = '非常棒！'; sub = '继续保持这个势头！'; }
    else if (pct >= 50) { emoji = '💪'; title = '还不错！'; sub = '多练几次会更好！'; }
    else { emoji = '📖'; title = '继续加油！'; sub = '错的词会反复出现帮你复习！'; }
  }

  let html = `<div class="r-emoji">${emoji}</div><div class="r-title">${title}</div><div class="r-sub">${sub}</div>`;

  if (type !== 'learn') {
    html += `<div class="r-stats">
      <div class="r-stat"><div class="n">${data.score}</div><div class="l">得分</div></div>
      <div class="r-stat"><div class="n">${data.correct}/${data.total}</div><div class="l">正确</div></div>
      <div class="r-stat"><div class="n">${data.maxStreak || 0}</div><div class="l">最高连击</div></div>
    </div>`;
    if (data.wrong && data.wrong.length > 0) {
      html += `<div class="r-wrong"><div class="rw-title">📝 需要复习的单词</div>`;
      data.wrong.forEach(w => { html += `<div class="rw-item"><span class="en">${w.en}</span><span class="cn">${w.cn}</span></div>`; });
      html += `</div>`;
    }
  }

  html += `<div class="r-btns">`;
  if (allDone && D.currentDay < TOTAL_DAYS) {
    html += `<button class="btn bg" onclick="advanceDay()">🚀 进入第 ${D.currentDay + 1} 天</button>`;
  }
  html += `<button class="btn bp" onclick="switchToScreen('scr-dashboard');switchTab(document.querySelector('[data-tab=dashboard]'))">返回首页</button>`;
  html += `</div>`;

  document.getElementById('result-content').innerHTML = html;
}

// ============================================================
//  WORDBOOK
// ============================================================
let wbFilter = 'all';

function renderWordbook() {
  const search = document.getElementById('wb-search').value.toLowerCase();
  // Build filters
  const cats = ['全部', ...new Set(WORDS.map(w => w.cat))];
  const filterDiv = document.getElementById('wb-filters');
  if (!filterDiv.innerHTML) {
    filterDiv.innerHTML = cats.map((c, i) =>
      `<button class="wb-f ${i === 0 ? 'active' : ''}" data-cat="${c === '全部' ? 'all' : c}" onclick="setWbFilter(this)">${c}</button>`
    ).join('');
  }

  let filtered = WORDS;
  if (wbFilter !== 'all') filtered = filtered.filter(w => w.cat === wbFilter);
  if (search) filtered = filtered.filter(w => w.en.toLowerCase().includes(search) || w.cn.includes(search));

  const list = document.getElementById('wb-list');
  list.innerHTML = filtered.map(w => {
    const m = D.mastery[w.en] || { correct: 0, wrong: 0 };
    const total = m.correct + m.wrong;
    let mt, mc;
    if (total === 0) { mt = '未学习'; mc = 'm-new'; }
    else if (m.correct >= 3 && m.correct > m.wrong * 2) { mt = '已掌握 ✓'; mc = 'm-master'; }
    else { mt = `学习中 (${m.correct}/${total})`; mc = 'm-learn'; }
    return `<div class="wb-item" onclick="this.querySelector('.wi-ex').style.display=this.querySelector('.wi-ex').style.display==='block'?'none':'block'">
      <div><div class="wi-en">${w.en}</div><div class="wi-cat">${w.cat} ${w.ph || ''}</div><div class="wi-ex" style="display:none;color:var(--t2);font-size:12px;margin-top:4px">${w.cn} — ${w.ex || ''}</div></div>
      <div class="wi-right"><div class="wi-cn">${w.cn}</div><div class="wi-m ${mc}">${mt}</div></div>
    </div>`;
  }).join('');
}

function setWbFilter(el) {
  document.querySelectorAll('.wb-f').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  wbFilter = el.dataset.cat;
  renderWordbook();
}

// ============================================================
//  CALENDAR
// ============================================================
function renderCalendar() {
  const grid = document.getElementById('day-grid');
  let html = '';
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const dp = D.dayProgress[d] || {};
    const done = dp.learned && dp.quizzed && dp.spelled;
    const isToday = d === D.currentDay;
    const future = d > D.currentDay;
    const cls = done ? 'done' : isToday ? 'today' : future ? 'future' : '';
    html += `<div class="day-dot ${cls}" onclick="${!future ? `D.currentDay=${d};save();switchTab(document.querySelector('[data-tab=dashboard]'))` : ''}">${d}</div>`;
  }
  grid.innerHTML = html;

  // Stats
  const completedDays = Object.keys(D.dayProgress).filter(d => {
    const dp = D.dayProgress[d];
    return dp.learned && dp.quizzed && dp.spelled;
  }).length;
  const learnedWords = Object.keys(D.mastery).filter(k => D.mastery[k].correct > 0).length;
  const masteredWords = Object.keys(D.mastery).filter(k => {
    const m = D.mastery[k];
    return m.correct >= 3 && m.correct > m.wrong * 2;
  }).length;

  document.getElementById('cal-stats').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="card" style="text-align:center;margin:0"><div style="font-size:24px;font-weight:900;color:var(--s)">${completedDays}</div><div style="font-size:11px;color:var(--t3)">已完成天数</div></div>
      <div class="card" style="text-align:center;margin:0"><div style="font-size:24px;font-weight:900;color:var(--p)">${D.streak}</div><div style="font-size:11px;color:var(--t3)">连续打卡</div></div>
      <div class="card" style="text-align:center;margin:0"><div style="font-size:24px;font-weight:900;color:var(--w)">${learnedWords}</div><div style="font-size:11px;color:var(--t3)">已学单词</div></div>
      <div class="card" style="text-align:center;margin:0"><div style="font-size:24px;font-weight:900;color:var(--ok)">${masteredWords}</div><div style="font-size:11px;color:var(--t3)">已掌握</div></div>
    </div>
  `;
}

// ============================================================
//  EFFECTS
// ============================================================
function showCombo(text) {
  const div = document.createElement('div');
  div.className = 'combo';
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 800);
}

function showStar(isCorrect) {
  const el = document.createElement('div');
  if (isCorrect) {
    // Tanjiro flies left to right with water breathing slash
    el.className = 'ds-char ds-tanjiro';
    el.innerHTML = `
      <div class="tanjiro-body">
        <div class="tanjiro-head"><div class="tanjiro-eyes"></div></div>
        <div class="tanjiro-earring"></div>
        <div class="tanjiro-haori"></div>
        <div class="tanjiro-slash">⚔</div>
      </div>
      <div class="tanjiro-text">全集中・水之呼吸！</div>`;
  } else {
    // Akaza flies right to left with a punch
    el.className = 'ds-char ds-akaza';
    el.innerHTML = `
      <div class="akaza-text">破壊殺・乱式！</div>
      <div class="akaza-body">
        <div class="akaza-head"><div class="akaza-lines"></div><div class="akaza-eyes"></div></div>
        <div class="akaza-torso"></div>
        <div class="akaza-fist"><div class="akaza-aura"></div><div class="akaza-fist-inner"></div></div>
      </div>`;
  }
  document.body.appendChild(el);
  setTimeout(() => el.remove(), isCorrect ? 2000 : 2200);
}

renderDashboard();
